name: pull_request

on:
  pull_request:
    branches: [main]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GITHUB_OWNER: ${{ github.repository_owner }}

permissions: {}

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: ghcr.io/rancher/ci-image/nix:20260603-18
    permissions:
      contents: read
    steps:
      - name: 'Checkout'
        # https://github.com/actions/checkout/releases
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - name: 'Lint terraform'
        shell: bash
        run: |
          bash .github/workflows/scripts/nix-run.sh "bash .github/workflows/scripts/lint-terraform.sh"

  eslint:
    name: 'Check GitHub scripts'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: ghcr.io/rancher/ci-image/nix:20260603-18
    permissions:
      contents: read
    steps:
      - name: 'Checkout'
        # https://github.com/actions/checkout/releases
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - name: 'Check for github-script errors'
        shell: bash
        run: |
          bash .github/workflows/scripts/nix-run.sh "bash .github/workflows/scripts/eslint.sh"

  actionlint:
    name: 'Lint Workflows'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: ghcr.io/rancher/ci-image/nix:20260603-18
    permissions:
      contents: read
    steps:
      - name: 'Checkout'
        # https://github.com/actions/checkout/releases
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - name: 'Action lint'
        shell: bash
        run: |
          bash .github/workflows/scripts/nix-run.sh "bash .github/workflows/scripts/actionlint.sh"

  shellcheck:
    name: 'Shellcheck'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: ghcr.io/rancher/ci-image/nix:20260603-18
    permissions:
      contents: read
    steps:
      - name: 'Checkout'
        # https://github.com/actions/checkout/releases
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - name: 'Shell check'
        shell: bash
        run: |
          bash .github/workflows/scripts/nix-run.sh "bash .github/workflows/scripts/shellcheck.sh"

  validate-commit-message:
    name: 'Validate Commit Message'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: ghcr.io/rancher/ci-image/nix:20260603-18
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: 'Checkout'
        # https://github.com/actions/checkout/releases
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - name: 'Check commit message'
        shell: bash
        run: |
          bash .github/workflows/scripts/nix-run.sh "bash .github/workflows/scripts/validate-commit-message.sh ${{ github.event.number }}"

  gitleaks:
    name: 'Scan for Secrets'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: ghcr.io/rancher/ci-image/nix:20260603-18
    permissions:
      contents: read
    steps:
      - name: 'Checkout'
        # https://github.com/actions/checkout/releases
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - name: 'Check for secrets'
        shell: bash
        run: |
          bash .github/workflows/scripts/nix-run.sh "bash .github/workflows/scripts/gitleaks.sh"
        continue-on-error: true
